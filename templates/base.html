<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>{{ title if title else "Panti Asuhan Mustika Tama" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      Panti Asuhan Mustika Tama
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">

  {% if session.get('admin') %}
    <!-- ================= MENU ADMIN ================= -->

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('admin_pendaftaran') }}">
        Pendaftaran
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('admin_penghuni') }}">
        Data Penghuni
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('admin_donasi') }}">
        Data Donasi
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link text-warning" href="{{ url_for('logout') }}">
        Logout
      </a>
    </li>

  {% else %}
    <!-- ================= MENU PUBLIK ================= -->

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('index') }}">Beranda</a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('kegiatan') }}">Kegiatan</a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('daftar') }}">Pendaftaran</a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('donasi') }}">Donasi</a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="{{ url_for('login') }}">Login Admin</a>
    </li>

  {% endif %}

</ul>

    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
