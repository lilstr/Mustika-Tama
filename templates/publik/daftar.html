{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
  <h3 class="mb-4">Pendaftaran Anak Asuh</h3>

  <form method="POST" enctype="multipart/form-data">

    <!-- DATA ANAK -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="mb-3">Data Anak</h6>

        <div class="mb-3">
          <label class="form-label">NIK</label>
          <input type="text" name="nik" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Nama Anak</label>
          <input type="text" name="nama_anak" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Jenis Kelamin</label>
          <select name="jenis_kelamin" class="form-control" required>
            <option value="">-- Pilih --</option>
            <option value="L">Laki-laki</option>
            <option value="P">Perempuan</option>
          </select>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Usia</label>
            <input type="number" name="usia" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Asal</label>
          <input type="text" name="asal" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Pendidikan</label>
          <input type="text" name="pendidikan" class="form-control">
        </div>

    <!-- KEBUTUHAN KHUSUS -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="mb-3">Kebutuhan Khusus</h6>

        <div class="mb-3">
          <label class="form-label">Berkebutuhan Khusus?</label>
          <select name="berkebutuhan_khusus" id="bk" class="form-control" required>
            <option value="tidak">Tidak</option>
            <option value="ya">Ya</option>
          </select>
        </div>

        <div class="mb-3 d-none" id="treatment-wrapper">
          <label class="form-label">Treatment / Kebutuhan Khusus</label>
          <textarea
            name="treatment_khusus"
            class="form-control"
            rows="3"
            placeholder="Jelaskan kebutuhan atau treatment khusus"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- DATA WALI -->
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="mb-3">Data Wali</h6>

        <div class="mb-3">
          <label class="form-label">Nama Wali</label>
          <input type="text" name="nama_wali" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">No. HP</label>
          <input type="text" name="no_hp" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Alamat</label>
          <textarea name="alamat" class="form-control" rows="2"></textarea>
        </div>
      </div>
    </div>

        <div class="mb-3">
          <label class="form-label">Alasan Pendaftaran</label>
          <textarea name="alasan" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Foto Anak</label>
          <input type="file" name="foto" class="form-control">
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Kirim Pendaftaran
    </button>

  </form>
</div>

<script>
document.getElementById('bk').addEventListener('change', function () {
  const wrapper = document.getElementById('treatment-wrapper');
  if (this.value === 'ya') {
    wrapper.classList.remove('d-none');
  } else {
    wrapper.classList.add('d-none');
  }
});
</script>

{% endblock %}
