{% extends 'base.html' %}
{% block content %}

<h3>Donasi Panti Asuhan Mustika Tama</h3>

<form method="POST" action="{{ url_for('donasi') }}">

  <label>Nama Lengkap</label>
  <input type="text" name="nama_donatur" class="form-control">

  <div class="form-check mt-2">
    <input type="checkbox" name="anonim" value="1" id="anonimCheck">
    <label for="anonimCheck">Donasi sebagai Hamba Allah</label>
  </div>

  <label class="mt-2">Kota</label>
  <input type="text" name="kota" class="form-control">

  <label class="mt-2">Nomor WhatsApp</label>
  <input type="text" name="no_hp" class="form-control">

  <label class="mt-2">Email</label>
  <input type="email" name="email" class="form-control">

  <label class="mt-2">Nominal Donasi</label>
  <input type="number" id="nominal" name="jumlah" class="form-control">

  <div class="mt-2">
    <button type="button" onclick="setNominal(10000)">Rp 10.000</button>
    <button type="button" onclick="setNominal(20000)">Rp 20.000</button>
    <button type="button" onclick="setNominal(50000)">Rp 50.000</button>
    <button type="button" onclick="setNominal(100000)">Rp 100.000</button>
  </div>

  <label class="mt-2">Do'a dan Harapan</label>
  <textarea name="doa" class="form-control"></textarea>

  <button class="btn btn-success mt-3">Lanjutkan</button>
</form>

<script>
function setNominal(val){
  document.getElementById('nominal').value = val;
}
</script>
{% endblock %}
