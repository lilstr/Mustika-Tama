{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header text-center">
        <h3 class="mb-0">
          <i class="bi bi-shield-check"></i> Verifikasi OTP
        </h3>
        <p class="text-muted small mt-2 mb-0">Masukkan kode OTP yang dikirim ke email Anda</p>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Kode OTP</label>
            <input type="text" name="otp" class="form-control" required placeholder="123456" maxlength="6">
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
            <i class="bi bi-check-circle"></i> Verifikasi
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('forgot_password') }}">Kirim Ulang OTP</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
