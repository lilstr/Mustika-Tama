{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-lg">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
          <h4 class="mt-3">Login Admin</h4>
          <p class="text-muted">Masuk ke Dashboard Panti Asuhan</p>
        </div>

        <form method="post">
          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-envelope"></i> Email atau Username
            </label>
            <input type="text" class="form-control form-control-lg" name="email_or_username" 
                   placeholder="Masukkan email atau username" required>
          </div>

          <div class="mb-4">
            <label class="form-label">
              <i class="bi bi-lock"></i> Password
            </label>
            <input type="password" class="form-control form-control-lg" name="password" 
                   placeholder="Masukkan password" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </form>

        <div class="text-end mt-3">
          <a href="{{ url_for('forgot_password') }}" class="small">
            <i class="bi bi-key-fill"></i> Lupa password?
          </a>
        </div>

        <hr class="my-4">

        <p class="text-center text-muted small">
          <i class="bi bi-info-circle"></i> Hanya admin yang dapat login di halaman ini.
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
