{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header text-center">
        <h3 class="mb-0">
          <i class="bi bi-lock"></i> Reset Password
        </h3>
        <p class="text-muted small mt-2 mb-0">Buat password baru untuk akun admin</p>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Password Baru</label>
            <input type="password" name="password" class="form-control" required placeholder="Minimal 6 karakter">
          </div>
          <div class="form-group">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" name="confirm_password" class="form-control" required placeholder="Ulangi password">
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            <i class="bi bi-save"></i> Simpan Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
