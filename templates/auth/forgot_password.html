{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header text-center">
        <h3 class="mb-0">
          <i class="bi bi-key"></i> Lupa Password
        </h3>
        <p class="text-muted small mt-2 mb-0">Masukkan email admin untuk reset password</p>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Email Admin</label>
            <input type="email" name="email" class="form-control" required placeholder="admin@example.com">
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            <i class="bi bi-send"></i> Kirim Kode OTP
          </button>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('login') }}">Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
